<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />
    <title>Spaced Repetition Tracker</title>
  </head>

  <body>
    <header>
      <h1>
        <a href="index.html" class="logo-link">Study Buddy SRT</a>
      </h1>
      <p>Track your learning progress with spaced repetition.</p>

      <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
      </nav>
    </header>

    <main>
      <section>
        <h2>Select User</h2>
        <label for="user-select">Choose a user:</label>
        <select
          id="user-select"
          name="user"
          aria-label="Select user to view agenda"
        >
          <option value="">-- Select a user --</option>
          <option value="user1">User uno</option>
          <option value="user2">User Dos</option>
          <option value="user3">User Tres</option>
          <option value="user4">User Cuatro</option>
          <option value="user5">User Cinco</option>
        </select>
      </section>

      <section>
        <h2>Web-Agenda</h2>
        <div id="agenda-container">
          <p>Please select a user to view their revision agenda.</p>
        </div>
      </section>

      <section>
        <h2>Add New Topic</h2>

        <form id="newtopic-form">
          <div>
            <label for="newtopic-name">Topic:</label>
            <input type="text" id="newtopic-name" name="topic" required />
          </div>

          <div>
            <label for="newtopic-date">Start Date:</label>
            <input type="date" id="newtopic-date" name="date" required />
          </div>
          <button type="submit" aria-label="Add new topic">Add Topic</button>
        </form>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Study Buddy SRT. All rights reserved.</p>
    </footer>

    <script type="module" src="./script.mjs"></script>
  </body>
</html>
